---
# ------------------------------------------------
# App-of-apps GitOps source
# ------------------------------------------------

ocp5_ea_wait_for_apps_ignore_errors: false

ocp5_ea_gitops_repo: https://github.com/rhpds/ocp5-ea-gitops.git
ocp5_ea_gitops_repo_tag: main

# ------------------------------------------------
# OpenShift GitOps
# ------------------------------------------------

ocp5_ea_openshift_gitops_install: true

ocp5_ea_openshift_gitops_operator_channel: latest
ocp5_ea_openshift_gitops_operator_automatic_install_plan_approval: true
ocp5_ea_openshift_gitops_operator_starting_csv: ""
ocp5_ea_openshift_gitops_operator_name: openshift-gitops-operator
ocp5_ea_openshift_gitops_operator_namespace: openshift-operators
# Catalog source pinning for GitOps operator — placeholder for future pinning
ocp5_ea_openshift_gitops_operator_catalog: redhat-operators
ocp5_ea_openshift_gitops_operator_use_catalog_snapshot: false
ocp5_ea_openshift_gitops_operator_catalogsource_name: ""
ocp5_ea_openshift_gitops_operator_catalogsource_namespace: openshift-operators
ocp5_ea_openshift_gitops_operator_catalog_snapshot_image: ""
ocp5_ea_openshift_gitops_operator_catalog_snapshot_image_tag: ""

ocp5_ea_openshift_gitops_operator_config:
  env:
    - name: ARGOCD_CLUSTER_CONFIG_NAMESPACES
      value: 'openshift-gitops'

ocp5_ea_openshift_gitops_setup_cluster_admin: true

ocp5_ea_openshift_gitops_enable_route: true
ocp5_ea_openshift_gitops_update_route_tls: true

ocp5_ea_openshift_gitops_update_resources: true

# Application Controller
ocp5_ea_openshift_gitops_controller_update: true
ocp5_ea_openshift_gitops_controller_requests_cpu: 512m
ocp5_ea_openshift_gitops_controller_requests_memory: 1Gi
ocp5_ea_openshift_gitops_controller_limits_cpu: "4"
ocp5_ea_openshift_gitops_controller_limits_memory: 4Gi
ocp5_ea_openshift_gitops_controller_app_sync: 3m

ocp5_ea_openshift_gitops_controller_remove_memory_limits: false

# Repo Server
ocp5_ea_openshift_gitops_repo_update: true
ocp5_ea_openshift_gitops_repo_requests_cpu: 500m
ocp5_ea_openshift_gitops_repo_requests_memory: 512Mi
ocp5_ea_openshift_gitops_repo_limits_cpu: "2"
ocp5_ea_openshift_gitops_repo_limits_memory: 2Gi

ocp5_ea_openshift_gitops_resource_customizations: |
  operators.coreos.com/Subscription:
    health.lua: |
      health_status = {}
      if obj.status ~= nil then
        if obj.status.conditions ~= nil then
          numDegraded = 0
          numPending = 0
          msg = ""
          for i, condition in pairs(obj.status.conditions) do
            msg = msg .. i .. ": " .. condition.type .. " | " .. condition.status .. "\n"
            if condition.type == "InstallPlanPending" and condition.status == "True" then
              numPending = numPending + 1
            elseif (condition.type == "InstallPlanMissing" and condition.reason ~= "ReferencedInstallPlanNotFound") then
              numDegraded = numDegraded + 1
            elseif (condition.type == "CatalogSourcesUnhealthy" or condition.type == "InstallPlanFailed") and condition.status == "True" then
              numDegraded = numDegraded + 1
            end
          end
          if numDegraded == 0 and numPending == 0 then
            health_status.status = "Healthy"
            health_status.message = msg
            return health_status
          elseif numPending > 0 and numDegraded == 0 then
            health_status.status = "Progressing"
            health_status.message = "An install plan for a subscription is pending installation"
            return health_status
          else
            health_status.status = "Degraded"
            health_status.message = msg
            return health_status
          end
        end
      end
      health_status.status = "Progressing"
      health_status.message = "An install plan for a subscription is pending installation"
      return health_status

ocp5_ea_openshift_gitops_ignore_differences: {}

# ------------------------------------------------
# Operator catalog source pinning (Helm app-of-apps)
# Placeholder for future pinning — disabled by default.
# When enabled, a frozen OLM catalog snapshot is deployed and all operator
# subscriptions use it instead of the live redhat-operators catalog.
# ------------------------------------------------

ocp5_ea_catalog_source_enabled: false
ocp5_ea_catalog_source_name: redhat-operators-snapshot
ocp5_ea_catalog_source_namespace: openshift-marketplace
ocp5_ea_catalog_source_image: quay.io/gpte-devops-automation/olm_snapshot_redhat_catalog
ocp5_ea_catalog_source_tag: v4.20_2026_02_11

# ------------------------------------------------
# Red Hat Advanced Cluster Security
# ------------------------------------------------

# ------------------------------------------------
# OCP 5.0 console cert workaround
# ------------------------------------------------
ocp5_ea_console_cert_workaround: true
ocp5_ea_console_cert_source_secret: cert-manager-ingress-cert
ocp5_ea_console_cert_source_namespace: openshift-ingress
ocp5_ea_console_cert_target_secret: console-serving-cert

# ------------------------------------------------
# Red Hat Advanced Cluster Security
# ------------------------------------------------

ocp5_ea_acs_application_name: acs
ocp5_ea_acs_namespace: acs
ocp5_ea_acs_clustername: local-cluster
ocp5_ea_acs_adminpassword: "{{ common_password }}"

# ------------------------------------------------
# LiteLLM / OpenShift Lightspeed
# ------------------------------------------------
ocp5_ea_litellm_api_url: >-
  {{ lookup('agnosticd_user_data', 'litellm_api_base_url') | default('') }}
ocp5_ea_litellm_api_key: >-
  {{ lookup('agnosticd_user_data', 'litellm_virtual_key') | default('') }}
ocp5_ea_litellm_provider: openai
ocp5_ea_litellm_model: qwen3-235b

# ------------------------------------------------
# oc-agentic CLI plugin
# ------------------------------------------------
ocp5_ea_install_oc_agentic: true
